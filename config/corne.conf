# --- SPLIT COMMUNICATION SETTINGS ---
# Tells ZMK there are two halves
CONFIG_ZMK_SPLIT=y
# Increases transmission power to overcome LED electrical noise
# CONFIG_ZMK_SPLIT_BLE_RETRY_THRESHOLD=5

# --- RGB UNDERGLOW SETTINGS ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# --- POWER MANAGEMENT (CRITICAL FOR TRRS) ---
# Keeps the VCC pin active to provide power to the other half
CONFIG_ZMK_EXT_POWER=y
# Forces LEDs to stay ON at startup
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# --- SLEEP & IDLE PREVENTION ---
# 'n' prevents the keyboard from turning off the LEDs after 30-60 seconds
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# --- THERMAL & POWER PROTECTION ---
# Keep brightness low (10% max) because powering two halves 
# through a TRRS cable causes a significant voltage drop.
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=10
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=5

# --- VISUAL PREFERENCES ---
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# --- BLUETOOTH STRENGTH ---
# Helps the peripheral (right) side "hear" the central (left) side better
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Force the Right side to be the Central (Master)
CONFIG_ZMK_KEYBOARD_NAME="CorneRight"
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
