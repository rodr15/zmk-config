# --- RGB UNDERGLOW SETTINGS ---
# Enables RGB functionality
CONFIG_ZMK_RGB_UNDERGLOW=y
# Required for WS2812/SK6812 LEDs used in the Corne
CONFIG_WS2812_STRIP=y

# --- POWER MANAGEMENT ---
# Ensures the VCC pin outputs power to the LEDs
CONFIG_ZMK_EXT_POWER=y
# Forces LEDs to be ON when the keyboard starts
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# --- STABILITY & FIXES (The 40-second fix) ---
# Disable automatic power off when idle (prevents them from turning off after 30-60s)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
# Keep RGB on even if USB is disconnected (prevents power state glitches)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# --- BATTERY & THERMAL PROTECTION ---
# Max brightness (0-100). Low value to avoid overheating the 3.3v regulator
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=10
# Initial brightness when turned on
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=5

# --- VISUAL PREFERENCES ---
# Default effect: 0=Solid, 1=Breathe, 2=Spectrum, 3=Swirl
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
# Speed of the effects (1-5)
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# --- BLUETOOTH SETTINGS ---
# Stronger signal can help if there is interference with RGB data
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
